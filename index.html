<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#03050f;
  --ink:#e2eaff;
  --dim:#3a4060;
  --e:#00ffe7;
  --d:#ff3cac;
  --glass:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.07);
  --glow-e:0 0 40px rgba(0,255,231,0.25);
  --glow-d:0 0 40px rgba(255,60,172,0.25);
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:'DM Mono',monospace;
  min-height:100vh;
  overflow-x:hidden;
}



/* Canvas */
#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
}

/* Layout */
.page{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:56px 20px 80px;
}

/* Header */
header{
  text-align:center;margin-bottom:52px;
  animation:riseUp .9s cubic-bezier(.16,1,.3,1) both;
}

.eyebrow{
  font-family:'Rajdhani',sans-serif;
  font-size:.68rem;letter-spacing:.38em;
  text-transform:uppercase;color:var(--dim);margin-bottom:12px;
}

h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(4.5rem,12vw,9rem);
  line-height:.92;letter-spacing:.025em;
  background:linear-gradient(140deg,#fff 0%,var(--e) 55%,#00b8a9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
}

h1::after{
  content:'CIPHERSHIFT';
  position:absolute;inset:0;
  background:linear-gradient(140deg,transparent,var(--e),transparent);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:0;animation:glitch-shine 6s 2s infinite;
}

@keyframes glitch-shine{
  0%,94%,100%{opacity:0;transform:translate(0)}
  95%{opacity:.6;transform:translate(-3px,1px)}
  97%{opacity:.4;transform:translate(3px,-1px)}
  99%{opacity:.6;transform:translate(-1px,2px)}
}

.sub{
  font-family:'Rajdhani',sans-serif;font-weight:300;
  font-size:.9rem;letter-spacing:.14em;
  color:var(--dim);margin-top:14px;text-transform:uppercase;
}

/* Mode toggle */
.mode-wrap{
  display:flex;gap:0;margin-bottom:38px;
  border:1px solid var(--glass-border);
  border-radius:60px;padding:5px;
  background:var(--glass);backdrop-filter:blur(12px);
  animation:riseUp .9s .1s cubic-bezier(.16,1,.3,1) both;
}

.mode-btn{
  padding:12px 38px;border:none;border-radius:60px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;
  font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;background:transparent;color:var(--dim);
  transition:color .3s,background .3s,box-shadow .3s;
}

.mode-btn.active.enc{
  background:linear-gradient(135deg,rgba(0,255,231,.15),rgba(0,255,231,.05));
  color:var(--e);
  box-shadow:inset 0 0 0 1px rgba(0,255,231,.3),var(--glow-e);
}
.mode-btn.active.dec{
  background:linear-gradient(135deg,rgba(255,60,172,.15),rgba(255,60,172,.05));
  color:var(--d);
  box-shadow:inset 0 0 0 1px rgba(255,60,172,.3),var(--glow-d);
}
.mode-btn:not(.active):hover{color:var(--ink);}

/* Card */
.card{
  width:100%;max-width:780px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:24px;
  padding:40px 40px 36px;
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
  animation:riseUp .9s .2s cubic-bezier(.16,1,.3,1) both;
}

.card::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--e),transparent);
  opacity:.6;transition:background .4s;
}
body.decrypt-mode .card::before{
  background:linear-gradient(90deg,transparent,var(--d),transparent);
}

/* scanlines */
.card::after{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:24px;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,
    rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 4px
  );
}

/* Field */
.field{margin-bottom:28px;}

.field-label{
  font-family:'Rajdhani',sans-serif;font-size:.68rem;
  letter-spacing:.28em;text-transform:uppercase;
  color:var(--dim);margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}

.char-count{font-size:.62rem;letter-spacing:.05em;}

textarea,input[type=number]{
  width:100%;background:rgba(0,0,0,.35);
  border:1px solid var(--glass-border);border-radius:14px;
  color:var(--ink);font-family:'DM Mono',monospace;
  font-size:.88rem;font-weight:300;line-height:1.85;
  padding:18px 20px;outline:none;resize:none;
  transition:border-color .25s,box-shadow .25s;
  caret-color:var(--e);
}
textarea{min-height:150px;}
textarea:focus,input[type=number]:focus{
  border-color:rgba(0,255,231,.4);
  box-shadow:0 0 0 3px rgba(0,255,231,.07),inset 0 0 20px rgba(0,255,231,.025);
}
body.decrypt-mode textarea:focus,
body.decrypt-mode input[type=number]:focus{
  border-color:rgba(255,60,172,.4);
  box-shadow:0 0 0 3px rgba(255,60,172,.07),inset 0 0 20px rgba(255,60,172,.025);
}
input[type=number]{max-width:180px;}
input[type=number]::-webkit-inner-spin-button{opacity:.3;}

/* Shift row */
.row{display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;margin-bottom:32px;}
.row .field{margin-bottom:0;}
.hint{
  font-family:'Rajdhani',sans-serif;font-size:.8rem;
  color:var(--dim);padding-bottom:16px;line-height:1.6;
}

/* Run button */
.run-btn{
  width:100%;padding:20px;border:none;border-radius:14px;
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
  letter-spacing:.2em;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .3s;margin-bottom:32px;
  background:linear-gradient(135deg,rgba(0,255,231,.1),rgba(0,180,160,.06));
  color:var(--e);
  box-shadow:inset 0 0 0 1px rgba(0,255,231,.28);
}
body.decrypt-mode .run-btn{
  background:linear-gradient(135deg,rgba(255,60,172,.1),rgba(200,0,120,.06));
  color:var(--d);
  box-shadow:inset 0 0 0 1px rgba(255,60,172,.28);
}
.run-btn .sweep{
  position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  transform:skewX(-20deg);animation:sweep 3s 1.2s infinite;
}
@keyframes sweep{0%,100%{left:-100%}55%{left:160%}}
.run-btn:hover{transform:translateY(-2px);box-shadow:inset 0 0 0 1px rgba(0,255,231,.5),var(--glow-e);}
body.decrypt-mode .run-btn:hover{box-shadow:inset 0 0 0 1px rgba(255,60,172,.5),var(--glow-d);}
.run-btn:active{transform:translateY(0);}

/* Output */
.out-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.out-label{
  font-family:'Rajdhani',sans-serif;font-size:.68rem;
  letter-spacing:.28em;text-transform:uppercase;color:var(--dim);
}
.copy-btn{
  font-family:'Rajdhani',sans-serif;font-size:.68rem;
  letter-spacing:.14em;text-transform:uppercase;
  background:transparent;border:1px solid var(--glass-border);
  color:var(--dim);padding:5px 16px;border-radius:20px;
  cursor:pointer;transition:all .2s;
}
.copy-btn:hover{color:var(--e);border-color:rgba(0,255,231,.35);}
body.decrypt-mode .copy-btn:hover{color:var(--d);border-color:rgba(255,60,172,.35);}
.copy-btn.ok{color:var(--e);border-color:rgba(0,255,231,.35);}

.output-box{
  background:rgba(0,0,0,.4);
  border:1px solid var(--glass-border);
  border-radius:14px;padding:20px 22px;
  min-height:90px;
  font-family:'DM Mono',monospace;font-size:.88rem;
  font-weight:300;line-height:1.85;word-break:break-all;
  color:var(--e);position:relative;overflow:hidden;
  transition:border-color .3s,box-shadow .3s;
}
.output-box.dec-col{color:var(--d);}
.output-box.empty{color:var(--dim);font-style:italic;}
.output-box.flash-e{animation:flashE .45s;}
.output-box.flash-d{animation:flashD .45s;}
@keyframes flashE{
  0%{box-shadow:none}50%{box-shadow:0 0 28px 4px rgba(0,255,231,.3)}100%{box-shadow:none}
}
@keyframes flashD{
  0%{box-shadow:none}50%{box-shadow:0 0 28px 4px rgba(255,60,172,.3)}100%{box-shadow:none}
}

/* Error */
.err{
  color:#ff4d6d;font-size:.72rem;font-family:'Rajdhani',sans-serif;
  letter-spacing:.1em;margin-top:6px;display:none;
}
.err.show{display:block;}

/* Divider */
.divider{
  width:100%;max-width:780px;
  display:flex;align-items:center;gap:20px;margin:44px 0 26px;
  animation:riseUp .9s .35s both;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--glass-border));
}
.divider::after{transform:scaleX(-1);}
.div-label{
  font-family:'Rajdhani',sans-serif;font-size:.62rem;
  letter-spacing:.32em;text-transform:uppercase;color:var(--dim);white-space:nowrap;
}

/* Chips */
.chips{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  animation:riseUp .9s .45s both;
}
.chip{
  font-family:'Rajdhani',sans-serif;font-size:.68rem;
  letter-spacing:.12em;text-transform:uppercase;
  padding:7px 18px;border-radius:40px;
  border:1px solid var(--glass-border);color:var(--dim);
  background:var(--glass);backdrop-filter:blur(8px);
}

@keyframes riseUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">

  <header>
    <div class="eyebrow">Alphanumeric Shift Cipher</div>
    <h1>CipherShift</h1>
    <div class="sub">Encode &amp; Decode — Instantly</div>
  </header>

  <div class="mode-wrap">
    <button class="mode-btn active enc" id="encBtn" onclick="setMode('e')">⟶ Encrypt</button>
    <button class="mode-btn dec" id="decBtn" onclick="setMode('d')">⟵ Decrypt</button>
  </div>

  <div class="card">
    <div class="field">
      <div class="field-label">
        <span id="inLabel">Plaintext</span>
        <span class="char-count" id="charCount">0 chars</span>
      </div>
      <textarea id="inputText" placeholder="Type your message…" oninput="onInput()"></textarea>
      <div class="err" id="inputErr">⚠ Please enter some text first.</div>
    </div>

    <div class="row">
      <div class="field">
        <div class="field-label">Shift Key</div>
        <input type="number" id="shiftKey" value="13" min="0" max="99999"/>
      </div>
      <div class="hint">
        Supports a–z &nbsp;·&nbsp; A–Z &nbsp;·&nbsp; 0–9<br/>
        Special chars pass through unchanged
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="run()">
      <span class="sweep"></span>
      <span id="btnLabel">ENCRYPT</span>
    </button>

    <div class="out-header">
      <div class="out-label" id="outLabel">Output</div>
      <button class="copy-btn" id="copyBtn" onclick="copyOut()">Copy</button>
    </div>
    <div class="output-box empty" id="output">Awaiting input…</div>
  </div>

  <div class="divider"><span class="div-label">cipher specs</span></div>

  <div class="chips">
    <div class="chip">Caesar-variant</div>
    <div class="chip">62-char alphabet</div>
    <div class="chip">Wrap-around keys</div>
    <div class="chip">Ctrl + Enter to run</div>
  </div>

</div>

<script>


/* ── Matrix rain canvas ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, cols, drops;
const CHARS = '01アイウエオカキクケサシスタチ∑∆Ωπ≈≠∞←→ABXYZ';

function initCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cols = Math.floor(W / 22);
  drops = Array.from({ length: cols }, () => Math.random() * -(H / 16) | 0);
}
function drawMatrix() {
  ctx.fillStyle = 'rgba(3,5,15,0.18)';
  ctx.fillRect(0, 0, W, H);
  const isD = document.body.classList.contains('decrypt-mode');
  drops.forEach((y, i) => {
    const ch = CHARS[Math.random() * CHARS.length | 0];
    const a = Math.random() * 0.65 + 0.08;
    ctx.fillStyle = isD ? `rgba(255,60,172,${a})` : `rgba(0,255,231,${a})`;
    ctx.font = `${Math.random() > .85 ? 13 : 10}px DM Mono,monospace`;
    ctx.fillText(ch, i * 22 + 2, y * 16);
    if (y * 16 > H && Math.random() > .965) drops[i] = 0;
    else drops[i]++;
  });
}
initCanvas();
window.addEventListener('resize', initCanvas);
setInterval(drawMatrix, 58);

/* ── Cipher core ── */
const ABC = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
function makeKey(shift) {
  const n = ABC.length, s = ((shift % n) + n) % n;
  const sh = ABC.slice(s) + ABC.slice(0, s);
  const e = {}, d = {};
  for (let i = 0; i < n; i++) { e[ABC[i]] = sh[i]; d[sh[i]] = ABC[i]; }
  return { e, d };
}
function encrypt(t, s) { const { e } = makeKey(s); return [...t].map(c => e[c] ?? c).join(''); }
function decrypt(t, s) { const { d } = makeKey(s); return [...t].map(c => d[c] ?? c).join(''); }

/* ── Scramble reveal ── */
const GLYPHS = '!@#$%^&*<>?/|~±§©¥₿∫';
function scrambleReveal(el, final, isEnc) {
  let frame = 0; const total = 20;
  const id = setInterval(() => {
    frame++;
    const revealed = Math.floor((frame / total) * final.length);
    let out = '';
    for (let i = 0; i < final.length; i++) {
      out += i < revealed ? final[i] : GLYPHS[Math.random() * GLYPHS.length | 0];
    }
    el.textContent = out;
    if (frame >= total) { clearInterval(id); el.textContent = final; }
  }, 25);
  el.classList.add(isEnc ? 'flash-e' : 'flash-d');
  setTimeout(() => el.classList.remove('flash-e', 'flash-d'), 500);
}

/* ── UI ── */
let mode = 'e';
function setMode(m) {
  mode = m;
  document.body.classList.toggle('decrypt-mode', m === 'd');
  document.getElementById('encBtn').className = 'mode-btn' + (m === 'e' ? ' active enc' : '');
  document.getElementById('decBtn').className = 'mode-btn' + (m === 'd' ? ' active dec' : '');
  document.getElementById('inLabel').textContent = m === 'e' ? 'Plaintext' : 'Ciphertext';
  document.getElementById('btnLabel').textContent = m === 'e' ? 'ENCRYPT' : 'DECRYPT';
  document.getElementById('inputText').placeholder = m === 'e' ? 'Type your message…' : 'Paste encrypted text…';
  resetOut();
}

function onInput() {
  const v = document.getElementById('inputText').value;
  document.getElementById('charCount').textContent = v.length + ' chars';
  document.getElementById('inputErr').classList.remove('show');
}

function resetOut() {
  const o = document.getElementById('output');
  o.textContent = 'Awaiting input…';
  o.className = 'output-box empty';
  document.getElementById('copyBtn').textContent = 'Copy';
  document.getElementById('copyBtn').classList.remove('ok');
  document.getElementById('outLabel').textContent = 'Output';
}

function run() {
  const txt = document.getElementById('inputText').value;
  if (!txt.trim()) { document.getElementById('inputErr').classList.add('show'); return; }
  document.getElementById('inputErr').classList.remove('show');
  const shift = parseInt(document.getElementById('shiftKey').value) || 0;
  const result = mode === 'e' ? encrypt(txt, shift) : decrypt(txt, shift);
  const o = document.getElementById('output');
  o.className = 'output-box' + (mode === 'd' ? ' dec-col' : '');
  o.textContent = '';
  scrambleReveal(o, result, mode === 'e');
  document.getElementById('outLabel').textContent = mode === 'e' ? 'Encrypted' : 'Decrypted';
}

function copyOut() {
  const o = document.getElementById('output');
  if (o.classList.contains('empty')) return;
  navigator.clipboard.writeText(o.textContent).then(() => {
    const b = document.getElementById('copyBtn');
    b.textContent = 'Copied ✓'; b.classList.add('ok');
    setTimeout(() => { b.textContent = 'Copy'; b.classList.remove('ok'); }, 2000);
  });
}

document.getElementById('inputText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); run(); }
});
</script>
</body>
